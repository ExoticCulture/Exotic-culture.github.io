<!DOCTYPE html>
<html>

<head>
<title>Exotic Culture Lookbook</title>

<style>

body{
margin:0;
font-family:Helvetica, sans-serif;
background:black;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
font-size:22px;
letter-spacing:3px;
border-bottom:1px solid #222;
}

nav a{
color:grey;
margin-left:20px;
text-decoration:none;
}

h1{
text-align:center;
margin-top:40px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
gap:20px;
padding:50px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
transition:transform .3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* IMAGE POPUP */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<div>EXOTIC CULTURE</div>

<nav>
<a href="index.html">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
<a href="photos.html">Photos</a>
</nav>
</header>

<h1>Exotic Culture Lookbook</h1>

<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">
<img src="5.jpeg">
<img src="6.jpeg">
<img src="10.jpeg">
<img src="11.jpeg">
<img src="12.jpeg">
<img src="13.jpeg">
<img src="14.jpeg">
<img src="15.jpeg"> 
<img src="16.jpeg"> 
<img src="17.jpeg">
<img src="18.jpeg">
<img src="19.jpeg">
<img src="20.jpeg">
<img src="21.jpeg">
<img src="22.jpeg">
<img src="23.jpeg">
<img src="24.jpeg">
<img src="25.jpeg">
<img src="26.jpeg">
<img src="27.jpeg">
<img src="28.jpeg">
<img src="29.jpeg">
<img src="30.jpeg">
<img src="31.jpeg">
<img src="32.jpeg">
<img src="33.jpeg">
  
</div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
img.addEventListener("click", () => {
lightbox.style.display = "flex";
lightboxImg.src = img.src;
});
});

lightbox.addEventListener("click", () => {
lightbox.style.display = "none";
});

</script>

</body>

</html>
